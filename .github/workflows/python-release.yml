name: Python Release to PyPI

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  check-tag:
    name: Check release tag
    runs-on: ubuntu-latest
    outputs:
      is-python: ${{ steps.check.outputs.is-python }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.release.tag_name }}" == py-v* ]]; then
            echo "is-python=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-python=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build distribution
    needs: check-tag
    if: needs.check-tag.outputs.is-python == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install build dependencies
        run: uv pip install --system build

      - name: Build package
        working-directory: libraries/python
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: libraries/python/dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tokenpricing
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tokenpricing
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
