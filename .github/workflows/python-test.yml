name: Python Test

on:
  push:
    branches: [main]
    paths:
      - "libraries/python/**"
  pull_request:
    paths:
      - "libraries/python/**"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: libraries/python
        run: uv sync

      - name: Run unit tests
        working-directory: libraries/python
        run: uv run pytest --cov=tokenpricing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: libraries/python/coverage.xml
          flags: python
          fail_ci_if_error: false
