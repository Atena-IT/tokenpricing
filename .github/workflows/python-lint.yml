name: Python Lint

on:
  push:
    branches: [main]
    paths:
      - "libraries/python/**"
      - ".pre-commit-config.yaml"
  pull_request:
    paths:
      - "libraries/python/**"
      - ".pre-commit-config.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install dependencies (dev)
        working-directory: libraries/python
        run: uv sync --group dev

      - name: Run pre-commit
        working-directory: libraries/python
        run: uv run pre-commit run -a --config ../../.pre-commit-config.yaml
